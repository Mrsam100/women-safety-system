name: saferide
description: AI-powered women cab safety application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.1
  firebase_messaging: ^15.2.1
  firebase_crashlytics: ^4.3.1
  firebase_analytics: ^11.4.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Maps
  google_maps_flutter: ^2.10.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Audio
  record: ^5.2.0
  just_audio: ^0.9.42

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # Encryption
  encrypt: ^5.0.3

  # Sensors
  sensors_plus: ^6.1.1

  # SMS
  telephony: ^0.2.0

  # Functional Programming
  dartz: ^0.10.1

  # Data Classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # TFLite AI
  tflite_flutter: ^0.11.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Image Picker
  image_picker: ^1.1.2

  # Contacts
  flutter_contacts: ^1.1.9+2

  # URL & Sharing
  url_launcher: ^6.3.1
  share_plus: ^10.1.4

  # UI
  shimmer: ^3.0.0
  lottie: ^3.3.1

  # Internationalization
  intl: ^0.19.0

  # Battery
  battery_plus: ^6.2.1

  # Connectivity
  connectivity_plus: ^6.1.3

  # Permission
  permission_handler: ^11.3.1

  # UUID
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.3
  hive_generator: ^2.0.1
  mockito: ^5.4.5
  build_verify: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
    - assets/audio/
    - assets/models/

  generate: true
