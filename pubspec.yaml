name: saferide
description: AI-powered women cab safety application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2
  firebase_crashlytics: ^5.0.8
  firebase_analytics: ^12.1.3

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # Maps
  google_maps_flutter: ^2.12.0

  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Audio
  record: ^6.2.0
  just_audio: ^0.10.5

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0

  # Encryption
  encrypt: ^5.0.3

  # Sensors
  sensors_plus: ^7.0.0

  # SMS
  telephony: ^0.2.0

  # Functional Programming
  dartz: ^0.10.1

  # Data Classes
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # TFLite AI
  tflite_flutter: ^0.12.1

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Image Picker
  image_picker: ^1.1.2

  # Contacts
  flutter_contacts: ^2.0.0

  # URL & Sharing
  url_launcher: ^6.3.1
  share_plus: ^12.0.1

  # UI
  shimmer: ^3.0.0
  lottie: ^3.3.1

  # Internationalization
  intl: ^0.20.2

  # Battery
  battery_plus: ^7.0.0

  # Connectivity
  connectivity_plus: ^7.0.0

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Permission
  permission_handler: ^12.0.1

  # UUID
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.9.3
  mockito: ^5.4.5
  build_verify: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
    - assets/audio/
    - assets/models/

  generate: true
